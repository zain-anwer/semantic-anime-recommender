name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Create a temporary deployment folder
          mkdir deploy_dir
          
          # 2. Copy ONLY what is needed (No frontend, no images)
          cp -r backend/* deploy_dir/
          cp Dockerfile deploy_dir/
          
          # 3. Initialize a brand NEW git repo in that folder (destroys all history)
          cd deploy_dir
          git init
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          
          # 4. Add files and commit (this creates a single, tiny commit)
          git add .
          git commit -m "Clean deployment of backend only"
          
          # 5. Force push this "history-less" commit to Hugging Face
          git push --force https://ze19n:$HF_TOKEN@huggingface.co/spaces/ze19n/anime-recommender-backend master:main
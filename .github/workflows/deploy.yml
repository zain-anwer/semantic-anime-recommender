run: |
          mkdir deploy_dir
          cp -r backend/* deploy_dir/
          if [ -f "Dockerfile" ]; then
            cp Dockerfile deploy_dir/
          fi
          
          cd deploy_dir
          
          # --- ADD THIS PART: Create the README with metadata ---
          cat <<EOF > README.md
          ---
          title: Anime Recommender Backend
          emoji: 🤖
          colorFrom: blue
          colorTo: indigo
          sdk: docker
          app_port: 7860
          pinned: false
          ---
          # Anime Recommender Backend
          FastAPI backend for semantic anime search.
          EOF
          # ------------------------------------------------------

          git init
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git checkout -b main
          git add .
          git commit -m "Clean deployment with required metadata"
          git push --force https://ze19n:$HF_TOKEN@huggingface.co/spaces/ze19n/anime-recommender-backend main:main
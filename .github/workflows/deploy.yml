name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Create a clean temporary directory
          mkdir deploy_dir
          
          # 2. Copy backend files
          cp -r backend/* deploy_dir/
          
          # 3. Handle Dockerfile (copies if in root, skips if already in backend)
          if [ -f "Dockerfile" ]; then
            cp Dockerfile deploy_dir/
          fi
          
          # 4. Initialize brand new git repo to wipe all history/binary issues
          cd deploy_dir
          git init
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git checkout -b main
          
          # 5. Add and commit only these clean files
          git add .
          git commit -m "Clean deployment of backend only"
          
          # 6. Force push to Hugging Face
          git push --force https://ze19n:$HF_TOKEN@huggingface.co/spaces/ze19n/anime-recommender-backend main:main
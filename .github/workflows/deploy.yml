- name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          mkdir deploy_dir
          
          # Copy backend contents
          cp -r backend/* deploy_dir/
          
          # If Dockerfile is inside backend, it's already copied. 
          # If it's in the root, this next line catches it.
          cp Dockerfile deploy_dir/ 2>/dev/null || echo "Dockerfile already in deploy_dir"
          
          cd deploy_dir
          git init
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add .
          git commit -m "Clean deployment"
          
          # Force push to HF
          git push --force https://ze19n:$HF_TOKEN@huggingface.co/spaces/ze19n/anime-recommender-backend master:main